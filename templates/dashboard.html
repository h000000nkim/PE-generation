<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 수행평가 목록</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  .page-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;
  }
  .page-header h1 { font-size: 1.8rem; margin: 0; }
  .btn-refresh {
    padding: 8px 18px; font-size: 0.85rem; border: 1px solid #ccc;
    border-radius: 8px; background: white; cursor: pointer; transition: background 0.2s;
  }
  .btn-refresh:hover { background: #f5f5f5; }
  .btn-refresh:disabled { opacity: 0.5; cursor: default; }

  .loading-state { text-align: center; padding: 80px 0; color: #888; }
  .spinner {
    width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #4CAF50;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 탭 */
  .tabs { display: flex; gap: 4px; margin-bottom: 1rem; border-bottom: 2px solid #e5e5e5; }
  .tab-btn {
    padding: 10px 20px; font-size: 0.9rem; font-weight: 600; border: none;
    background: none; cursor: pointer; color: #888; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { color: #222; border-bottom-color: #222; }
  .tab-btn .count {
    display: inline-block; background: #eee; color: #555; font-size: 0.75rem;
    padding: 1px 7px; border-radius: 10px; margin-left: 6px;
  }
  .tab-btn.active .count { background: #222; color: white; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 액션 바 */
  .action-bar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem;
    padding: 10px 14px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e5e5;
    align-items: center;
  }
  .action-bar .btn {
    padding: 6px 14px; font-size: 0.8rem; font-weight: 600; border: none;
    border-radius: 6px; cursor: pointer; transition: opacity 0.2s; color: white;
  }
  .action-bar .btn:disabled { opacity: 0.4; cursor: default; }
  .action-bar .btn.analyze { background: #f97316; }
  .action-bar .btn.lock { background: #6b7280; }
  .action-bar .btn.unlock { background: #3b82f6; }
  .action-bar .select-info { font-size: 0.8rem; color: #888; margin-left: auto; }

  /* 카드 */
  .task-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;
  }
  .task-card {
    background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px;
    transition: box-shadow 0.2s, transform 0.1s; display: flex; flex-direction: column; gap: 10px;
  }
  .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
  .task-card.selected { border-color: #3b82f6; background: #eff6ff; }
  .task-card.locked-card { opacity: 0.55; }
  .task-card.has-error { border-color: #fca5a5; }

  .card-top { display: flex; align-items: center; gap: 10px; }
  .card-check { width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6; flex-shrink: 0; }
  .card-link { text-decoration: none; color: inherit; flex: 1; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-subject {
    font-size: 0.75rem; font-weight: 700; color: #4CAF50;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .card-deadline {
    font-size: 0.72rem; font-weight: 600; color: #888; white-space: nowrap;
  }
  .card-deadline.urgent { color: #dc2626; }
  .card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.3; word-break: break-all; margin-top: 2px; }
  .card-name { font-size: 0.8rem; color: #888; margin-top: 1px; }

  /* 파이프라인 스텝 */
  .pipeline { display: flex; gap: 4px; }
  .pipe-step {
    flex: 1; text-align: center; padding: 6px 2px; border-radius: 6px;
    font-size: 0.68rem; font-weight: 600; border: 1.5px solid transparent;
    transition: all 0.2s;
  }
  .pipe-step .step-label { color: #555; font-size: 0.6rem; margin-top: 2px; }
  .pipe-step.idle { background: #d4d4d4; color: #333; }
  .pipe-step.idle .step-label { color: #555; }
  .pipe-step.done { background: #d1fae5; color: #065f46; }
  .pipe-step.running { background: #eff6ff; color: #1d4ed8; border-color: #3b82f6; animation: pulse 1.5s infinite; }
  .pipe-step.error { background: #fef2f2; color: #991b1b; border-color: #fca5a5; }
  .pipe-step.verify-pass { background: #d1fae5; color: #065f46; }
  .pipe-step.verify-warn { background: #fef3c7; color: #92400e; }
  .pipe-step.verify-fail { background: #fecaca; color: #991b1b; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

  /* 상태 바 */
  .card-status-bar {
    font-size: 0.72rem; padding: 5px 10px; border-radius: 6px; text-align: center; font-weight: 600;
  }
  .card-status-bar.running { background: #eff6ff; color: #1d4ed8; }
  .card-status-bar.complete { background: #f0fdf4; color: #166534; }
  .card-status-bar.error { background: #fef2f2; color: #991b1b; }

  .empty-state { text-align: center; padding: 80px 0; color: #aaa; }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>수행평가 대시보드</h1>
    <button class="btn-refresh" id="refreshBtn" onclick="loadTasks(true)">새로고침</button>
  </div>

  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <p>과업 목록을 불러오는 중입니다…<br><small>처음 로드 시 1~2분 소요될 수 있습니다.</small></p>
  </div>

  <div id="content" style="display:none">

    <div class="action-bar" id="action-bar">
      <button class="btn analyze" onclick="batchAnalysis()" id="batchAnalyzeBtn" disabled>사전분석</button>
      <button class="btn" onclick="batchVerify()" id="batchVerifyBtn" disabled style="background:#7c3aed">검증</button>
      <button class="btn lock" onclick="moveToLock()" id="lockBtn" disabled>잠금으로 이동</button>
      <button class="btn unlock" onclick="moveToUnlock()" id="unlockBtn" disabled>완료로 이동</button>
      <span class="select-info" id="selectInfo">항목을 선택하세요</span>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('todo')" id="tab-todo">
        진행중 <span class="count" id="count-todo">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('done')" id="tab-done">
        완료 <span class="count" id="count-done">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('locked')" id="tab-locked">
        잠금 <span class="count" id="count-locked">0</span>
      </button>
    </div>
    <div id="panel-todo" class="tab-panel active"></div>
    <div id="panel-done" class="tab-panel"></div>
    <div id="panel-locked" class="tab-panel"></div>
  </div>

</div>

<script>
let allTasks = [];
let selectedIds = new Set();
let polling = null;
let currentTab = 'todo';

function isDone(status) {
  return status && (status.includes('완료') || status.toLowerCase().includes('done'));
}
function statusClass(status) {
  if (isDone(status)) return 'done';
  if (status && (status.includes('진행') || status.includes('중'))) return 'in-progress';
  return 'pending';
}

function formatElapsed(sec) {
  if (!sec) return '';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m > 0 ? `${m}분 ${s}초` : `${s}초`;
}

function dDay(dueDate) {
  if (!dueDate) return '';
  const now = new Date(); now.setHours(0,0,0,0);
  const due = new Date(dueDate); due.setHours(0,0,0,0);
  const diff = Math.round((due - now) / 86400000);
  if (diff < 0) return `D+${Math.abs(diff)}`;
  if (diff === 0) return 'D-Day';
  return `D-${diff}`;
}

function pipeStep(label, count, state, extra) {
  // state: idle, done, running, error, verify-pass, verify-warn, verify-fail
  let content = '—';
  if (state === 'idle') content = '—';
  else if (state === 'running') content = extra || '⟳';
  else if (state === 'error') content = '✕';
  else if (state === 'done') content = count > 0 ? `✓${count > 1 ? ' '+count+'회' : ''}` : '✓';
  else if (state.startsWith('verify-')) content = extra || '✓';

  return `<div class="pipe-step ${state}">
    <div>${content}</div>
    <div class="step-label">${label}</div>
  </div>`;
}

function cardHTML(t) {
  const checked = selectedIds.has(t.block_id) ? 'checked' : '';
  const selClass = selectedIds.has(t.block_id) ? 'selected' : '';
  const lockClass = t.locked ? 'locked-card' : '';
  const errorClass = t.job_warning ? 'has-error' : '';
  const isRunning = t.job_status === 'running';
  const runLabel = (t.job_label || '').trim();

  // 마감일
  const dd = dDay(t.due_date);
  const ddClass = dd && (dd === 'D-Day' || dd.startsWith('D+')) ? 'urgent' : '';
  const deadlineHtml = t.due_date ? `<span class="card-deadline ${ddClass}">${t.due_date.slice(5)} (${dd})</span>` : '';

  // 파이프라인 상태 계산
  let anState = 'idle', anCount = t.count_analysis || 0;
  let drState = 'idle', drCount = t.count_draft || 0;
  let rvState = 'idle', rvCount = t.count_revision || 0;
  let vfState = 'idle', vfExtra = '';

  if (anCount > 0) anState = 'done';
  if (drCount > 0) drState = 'done';
  if (rvCount > 0) rvState = 'done';

  // 검증 상태
  const vfCount = t.count_verify || 0;
  const vfCountLabel = vfCount > 1 ? ` ${vfCount}회` : '';
  if (t.verify_status === 'pass') { vfState = 'verify-pass'; vfExtra = t.verify_score != null ? `${t.verify_score}점${vfCountLabel}` : `✓${vfCountLabel}`; }
  else if (t.verify_status === 'warning') { vfState = 'verify-warn'; vfExtra = t.verify_score != null ? `⚠${t.verify_score}${vfCountLabel}` : `⚠${vfCountLabel}`; }
  else if (t.verify_status === 'fail') { vfState = 'verify-fail'; vfExtra = t.verify_score != null ? `✕${t.verify_score}${vfCountLabel}` : `✕${vfCountLabel}`; }

  // 진행 중 상태 오버라이드
  let runExtra = '';
  if (isRunning) {
    runExtra = `<span class="run-timer" data-start="${t.job_elapsed || 0}"></span>`;
    if (runLabel === '사전분석') anState = 'running';
    else if (runLabel === '초안 작성') drState = 'running';
    else if (runLabel === '수정') rvState = 'running';
    else if (runLabel === '검증') vfState = 'running';
  }

  // 오류 상태
  if (t.job_warning) {
    if (runLabel === '사전분석') anState = 'error';
    else if (runLabel === '초안 작성') drState = 'error';
    else if (runLabel === '수정') rvState = 'error';
    else if (runLabel === '검증') vfState = 'error';
  }

  // 상태 바
  let statusBar = '';
  if (isRunning) {
    statusBar = `<div class="card-status-bar running">${runLabel} 진행 중... ${runExtra}</div>`;
  } else if (t.job_warning) {
    statusBar = `<div class="card-status-bar error">❌ ${t.job_warning}</div>`;
  } else if (t.verify_status === 'pass') {
    statusBar = `<div class="card-status-bar complete">✅ 검증 통과 ${t.verify_score != null ? t.verify_score+'/100' : ''}</div>`;
  }

  return `
    <div class="task-card ${selClass} ${lockClass} ${errorClass}" id="card-${t.block_id}">
      <div class="card-top">
        <input type="checkbox" class="card-check" ${checked}
               onchange="toggleSelect('${t.block_id}', this.checked)" />
        <a class="card-link" href="/task/${t.block_id}">
          <div class="card-header">
            ${t.subject ? `<span class="card-subject">${t.subject}</span>` : ''}
            ${deadlineHtml}
          </div>
          <div class="card-title">${(t.title||'').replace((t.subject||'')+'_','').replace((t.subject||'')+' _','').trim() || t.title || '(제목 없음)'}</div>
        </a>
      </div>
      <div class="pipeline">
        ${pipeStep('분석', anCount, anState, isRunning && runLabel === '사전분석' ? runExtra : '')}
        ${pipeStep('초안', drCount, drState, isRunning && runLabel === '초안 작성' ? runExtra : '')}
        ${pipeStep('수정', rvCount, rvState, isRunning && runLabel === '수정' ? runExtra : '')}
        ${pipeStep('검증', 0, vfState, vfExtra)}
      </div>
      ${statusBar}
    </div>`;
}

function toggleSelect(bid, checked) {
  if (checked) selectedIds.add(bid); else selectedIds.delete(bid);
  const card = document.getElementById(`card-${bid}`);
  if (card) card.classList.toggle('selected', checked);
  updateActionBar();
}

function updateActionBar() {
  const n = selectedIds.size;
  const info = document.getElementById('selectInfo');
  info.textContent = n > 0 ? `${n}개 선택됨` : '항목을 선택하세요';
  info.style.color = '#888';

  document.getElementById('batchAnalyzeBtn').disabled = n === 0;
  document.getElementById('batchVerifyBtn').disabled = n === 0;
  // 잠금 탭에서는 "잠금으로 이동" 비활성, 반대도 마찬가지
  document.getElementById('lockBtn').disabled = n === 0 || currentTab === 'locked';
  document.getElementById('unlockBtn').disabled = n === 0 || currentTab !== 'locked';
}

function sortByApplyDate(arr) {
  return arr.sort((a, b) => (a.apply_date || '9999') .localeCompare(b.apply_date || '9999'));
}

function renderTasks(tasks) {
  allTasks = tasks;
  const todo = sortByApplyDate(tasks.filter(t => !isDone(t.status) && !t.locked));
  const done = sortByApplyDate(tasks.filter(t => isDone(t.status) && !t.locked));
  const locked = sortByApplyDate(tasks.filter(t => t.locked));

  document.getElementById('count-todo').textContent = todo.length;
  document.getElementById('count-done').textContent = done.length;
  document.getElementById('count-locked').textContent = locked.length;

  document.getElementById('panel-todo').innerHTML = todo.length
    ? `<div class="task-grid">${todo.map(cardHTML).join('')}</div>`
    : '<div class="empty-state"><p>진행중인 과제가 없습니다.</p></div>';

  document.getElementById('panel-done').innerHTML = done.length
    ? `<div class="task-grid">${done.map(cardHTML).join('')}</div>`
    : '<div class="empty-state"><p>완료된 과제가 없습니다.</p></div>';

  document.getElementById('panel-locked').innerHTML = locked.length
    ? `<div class="task-grid">${locked.map(cardHTML).join('')}</div>`
    : '<div class="empty-state"><p>잠금된 과제가 없습니다.</p></div>';

  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  if (typeof startDashPolling === 'function') startDashPolling();
}

function switchTab(name) {
  currentTab = name;
  selectedIds.clear();
  ['todo', 'done', 'locked'].forEach(n => {
    document.getElementById(`tab-${n}`).classList.toggle('active', n === name);
    document.getElementById(`panel-${n}`).classList.toggle('active', n === name);
  });
  updateActionBar();
}

async function loadTasks(force = false) {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  if (force) {
    document.getElementById('content').style.display = 'none';
    document.getElementById('loading-state').style.display = 'block';
    document.querySelector('#loading-state p').innerHTML = '새로고침 중…';
  }
  try {
    const url = '/api/my-tasks' + (force ? '?refresh=true' : '');
    const res = await fetch(url);
    const data = await res.json();
    if (data.status === 'ok') {
      clearInterval(polling); polling = null;
      if (data.tasks && data.tasks.length > 0) {
        renderTasks(data.tasks);
        // 백그라운드 갱신 중이면 잠시 후 자동 리로드
        if (data.refreshing) {
          setTimeout(() => loadTasks(false), 5000);
        }
        // Notion 갱신 실패 경고
        const staleBar = document.getElementById('stale-bar');
        if (data.stale) {
          if (!staleBar) {
            const bar = document.createElement('div');
            bar.id = 'stale-bar';
            bar.style.cssText = 'padding:8px 16px;background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;margin-bottom:12px;font-size:0.82rem;color:#92400e;display:flex;justify-content:space-between;align-items:center';
            bar.innerHTML = '<span>⚠️ Notion 동기화 실패 — 최근 변경사항이 반영되지 않았을 수 있습니다</span><button onclick="loadTasks(true);this.parentElement.remove()" style="padding:4px 12px;border:1px solid #fcd34d;border-radius:6px;background:white;cursor:pointer;font-size:0.78rem;font-weight:600">재시도</button>';
            document.getElementById('content').prepend(bar);
          }
        } else if (staleBar) {
          staleBar.remove();
        }
      } else {
        document.getElementById('loading-state').style.display = 'block';
        document.getElementById('loading-state').innerHTML =
          `<p style="color:#f97316;font-size:0.95rem">⚠️ 과제 목록이 비어 있습니다.<br>
          <small style="color:#888">서버가 재시작되어 캐시가 초기화되었을 수 있습니다.</small><br>
          <button onclick="loadTasks(true)" style="margin-top:12px;padding:8px 20px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:white;font-weight:600">강제 새로고침</button></p>`;
        document.getElementById('content').style.display = 'none';
      }
      btn.disabled = false;
    } else if (data.status === 'loading') {
      document.getElementById('loading-state').style.display = 'block';
      document.getElementById('loading-state').innerHTML =
        `<div class="spinner"></div><p>과업 목록을 불러오는 중…<br><small>Notion에서 데이터를 가져오고 있습니다.</small></p>`;
      if (!polling) polling = setInterval(() => loadTasks(false), 3000);
    } else if (data.status === 'error') {
      document.getElementById('loading-state').style.display = 'block';
      document.getElementById('loading-state').innerHTML =
        `<p style="color:#ef4444">❌ API 오류: ${data.message || data.error || '알 수 없는 오류'}<br>
        <button onclick="loadTasks(true)" style="margin-top:12px;padding:8px 20px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:white;font-weight:600">재시도</button></p>`;
      btn.disabled = false;
    } else {
      if (!polling) polling = setInterval(() => loadTasks(false), 3000);
    }
  } catch (e) {
    document.getElementById('loading-state').style.display = 'block';
    document.getElementById('loading-state').innerHTML = `<p style="color:#ef4444">❌ 서버 연결 실패: ${e.message}<br>
      <small style="color:#888">서버가 실행 중인지 확인하세요.</small><br>
      <button onclick="loadTasks(true)" style="margin-top:12px;padding:8px 20px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:white;font-weight:600">재시도</button></p>`;
    btn.disabled = false;
  }
}

async function batchAnalysis() {
  const ids = [...selectedIds];
  if (!ids.length) return;
  const btn = document.getElementById('batchAnalyzeBtn');
  btn.disabled = true;
  btn.textContent = `분석 시작 (${ids.length}개)...`;

  try {
    const resp = await fetch('/api/batch-analysis', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ block_ids: ids })
    });
    const data = await resp.json();
    btn.textContent = '사전분석';
    btn.disabled = false;
    selectedIds.clear();
    loadTasks(false);
  } catch(e) {
    btn.textContent = '오류';
    btn.disabled = false;
  }
}

async function batchVerify() {
  const ids = [...selectedIds];
  if (!ids.length) return;
  const btn = document.getElementById('batchVerifyBtn');
  btn.disabled = true;
  btn.textContent = `검증 시작 (${ids.length}개)...`;

  try {
    const resp = await fetch('/api/batch-verify', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ block_ids: ids })
    });
    const data = await resp.json();
    btn.textContent = '검증';
    btn.disabled = false;
    selectedIds.clear();
    loadTasks(false);
  } catch(e) {
    btn.textContent = '오류';
    btn.disabled = false;
  }
}

async function moveToLock() {
  const ids = [...selectedIds];
  if (!ids.length || currentTab === 'locked') return;
  await fetch('/api/lock-tasks', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ block_ids: ids })
  });
  selectedIds.clear();
  await loadTasks(false);
  switchTab('locked');
  const info = document.getElementById('selectInfo');
  info.textContent = `${ids.length}개 잠금으로 이동 완료`;
  info.style.color = '#166534';
}

async function moveToUnlock() {
  const ids = [...selectedIds];
  if (!ids.length || currentTab !== 'locked') return;
  await fetch('/api/unlock-tasks', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ block_ids: ids })
  });
  selectedIds.clear();
  await loadTasks(false);
  switchTab('done');
  const info = document.getElementById('selectInfo');
  info.textContent = `${ids.length}개 완료로 이동 완료`;
  info.style.color = '#166534';
}

loadTasks();

// 실시간 타이머 (1초마다 run-timer 업데이트)
let _timerInterval = null;
function startTimerUpdates() {
  if (_timerInterval) clearInterval(_timerInterval);
  _timerInterval = setInterval(() => {
    document.querySelectorAll('.run-timer').forEach(el => {
      let sec = parseInt(el.dataset.start || '0') + 1;
      el.dataset.start = sec;
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      el.textContent = m > 0 ? `${m}분 ${s}초` : `${s}초`;
    });
  }, 1000);
}

// 작업 중인 항목이 있으면 10초마다 갱신, 아니면 30초마다
let _dashPoll = null;
function startDashPolling() {
  if (_dashPoll) clearInterval(_dashPoll);
  const hasRunning = allTasks.some(t => t.job_status === 'running');
  const interval = hasRunning ? 10000 : 30000;
  _dashPoll = setInterval(() => loadTasks(false), interval);
  if (hasRunning) startTimerUpdates();
  else if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
}

// 30초마다 새 과제 확인
setTimeout(() => {
  startDashPolling();
  setInterval(async () => {
    try {
      const res = await fetch('/api/check-new-tasks');
      const data = await res.json();
      if (data.new_tasks && data.new_tasks.length > 0) loadTasks(false);
    } catch(e) {}
  }, 30000);
}, 5000);
</script>
</body>
