<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 수행평가 목록</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .page-header h1 { font-size: 1.8rem; margin: 0; }
  .btn-refresh {
    padding: 8px 18px;
    font-size: 0.85rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-refresh:hover { background: #f5f5f5; }
  .btn-refresh:disabled { opacity: 0.5; cursor: default; }

  /* 로딩 */
  .loading-state {
    text-align: center;
    padding: 80px 0;
    color: #888;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #eee;
    border-top-color: #4CAF50;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 탭 */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid #e5e5e5;
  }
  .tab-btn {
    padding: 10px 20px;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    background: none;
    cursor: pointer;
    color: #888;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { color: #222; border-bottom-color: #222; }
  .tab-btn .count {
    display: inline-block;
    background: #eee;
    color: #555;
    font-size: 0.75rem;
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 6px;
  }
  .tab-btn.active .count { background: #222; color: white; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 과업 카드 그리드 */
  .task-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .task-card {
    background: white;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.1s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .task-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }
  .card-subject {
    font-size: 0.78rem;
    font-weight: 600;
    color: #4CAF50;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 12px;
    line-height: 1.4;
    word-break: break-all;
  }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 0.78rem;
    color: #666;
  }
  .meta-tag {
    background: #f5f5f5;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .status-badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .status-badge.pending   { background: #fff3cd; color: #856404; }
  .status-badge.in-progress { background: #cce5ff; color: #004085; }
  .status-badge.done      { background: #d4edda; color: #155724; }

  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: #aaa;
  }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>작업해야할 과제 목록</h1>
    <button class="btn-refresh" id="refreshBtn" onclick="loadTasks(true)">새로고침</button>
  </div>

  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <p>과업 목록을 불러오는 중입니다…<br><small>처음 로드 시 1~2분 소요될 수 있습니다.</small></p>
  </div>

  <div id="content" style="display:none">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('todo')" id="tab-todo">
        작업해야할 과제 <span class="count" id="count-todo">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('done')" id="tab-done">
        완료한 과제목록 <span class="count" id="count-done">0</span>
      </button>
    </div>
    <div id="panel-todo" class="tab-panel active"></div>
    <div id="panel-done" class="tab-panel"></div>
  </div>

</div>

<script>
let polling = null;

function isDone(status) {
  return status && (status.includes('완료') || status.toLowerCase().includes('done'));
}

function statusClass(status) {
  if (isDone(status)) return 'done';
  if (status && (status.includes('진행') || status.includes('중'))) return 'in-progress';
  return 'pending';
}

function cardHTML(t) {
  return `
    <a class="task-card" href="/task/${t.block_id}">
      ${t.subject ? `<div class="card-subject">${t.subject}</div>` : ''}
      <div class="card-title">${t.title || '(제목 없음)'}</div>
      <div class="card-meta">
        ${t.grade    ? `<span class="meta-tag">${t.grade}</span>`    : ''}
        ${t.semester ? `<span class="meta-tag">${t.semester}</span>` : ''}
        ${t.activity ? `<span class="meta-tag">${t.activity}</span>` : ''}
        ${t.status   ? `<span class="status-badge ${statusClass(t.status)}">${t.status}</span>` : ''}
      </div>
    </a>`;
}

function renderTasks(tasks) {
  const todo = tasks.filter(t => !isDone(t.status));
  const done = tasks.filter(t =>  isDone(t.status));

  document.getElementById('count-todo').textContent = todo.length;
  document.getElementById('count-done').textContent = done.length;

  const todoPanel = document.getElementById('panel-todo');
  const donePanel = document.getElementById('panel-done');

  todoPanel.innerHTML = todo.length
    ? `<div class="task-grid">${todo.map(cardHTML).join('')}</div>`
    : '<div class="empty-state"><p>작업 대기 중인 과제가 없습니다.</p></div>';

  donePanel.innerHTML = done.length
    ? `<div class="task-grid">${done.map(cardHTML).join('')}</div>`
    : '<div class="empty-state"><p>완료된 과제가 없습니다.</p></div>';

  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function switchTab(name) {
  ['todo', 'done'].forEach(n => {
    document.getElementById(`tab-${n}`).classList.toggle('active', n === name);
    document.getElementById(`panel-${n}`).classList.toggle('active', n === name);
  });
}

async function loadTasks(force = false) {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;

  if (force) {
    document.getElementById('content').style.display = 'none';
    document.getElementById('loading-state').style.display = 'block';
    document.querySelector('#loading-state p').innerHTML = '새로고침 중…';
  }

  try {
    const url = '/api/my-tasks' + (force ? '?refresh=true' : '');
    const res  = await fetch(url);
    const data = await res.json();

    if (data.status === 'ok') {
      clearInterval(polling);
      polling = null;
      renderTasks(data.tasks);
      btn.disabled = false;
    } else {
      if (!polling) {
        polling = setInterval(() => loadTasks(false), 3000);
      }
    }
  } catch (e) {
    document.getElementById('loading-state').innerHTML =
      `<p style="color:#f44336">오류: ${e.message}</p>`;
    btn.disabled = false;
  }
}

loadTasks();
</script>
</body>
</html>
