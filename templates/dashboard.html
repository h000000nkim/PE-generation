<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수행평가 작업 시작</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  .link-input-container {
    max-width: 700px;
    margin: 80px auto;
    text-align: center;
  }
  .link-input-container h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }
  .link-input-container p {
    color: #666;
    margin-bottom: 2rem;
    font-size: 1.1rem;
  }
  .link-form {
    display: flex;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .link-input {
    flex: 1;
    padding: 15px 20px;
    font-size: 1rem;
    border: 2px solid #ddd;
    border-radius: 8px;
    transition: border-color 0.2s;
  }
  .link-input:focus {
    outline: none;
    border-color: #4CAF50;
  }
  .btn-submit {
    padding: 15px 40px;
    font-size: 1rem;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  .btn-submit:hover {
    background: #45a049;
  }
  .example {
    color: #999;
    font-size: 0.9rem;
    margin-top: 1rem;
  }
  .error {
    color: #f44336;
    margin-top: 1rem;
    display: none;
  }
</style>
</head>
<body>
<div class="container">
  <div class="link-input-container">
    <h1>📝 수행평가 작업 시작</h1>
    <p>카카오톡에서 받은 Notion 링크를 붙여넣으세요</p>

    <form class="link-form" onsubmit="handleSubmit(event)">
      <input
        type="text"
        class="link-input"
        id="notionLink"
        placeholder="https://www.notion.so/..."
        required
      />
      <button type="submit" class="btn-submit">시작 →</button>
    </form>

    <div class="example">
      예시: https://www.notion.so/32946991dbbd81ed9f81dbed9ba2296d
    </div>

    <div class="error" id="errorMsg"></div>
  </div>
</div>

<script>
function handleSubmit(e) {
  e.preventDefault();
  const input = document.getElementById('notionLink');
  const errorMsg = document.getElementById('errorMsg');
  const link = input.value.trim();

  // Notion 링크에서 block_id 추출
  const blockIdMatch = link.match(/([a-f0-9]{32}|[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})/i);

  if (blockIdMatch) {
    const blockId = blockIdMatch[1];
    // 하이픈이 없으면 추가
    const formattedId = blockId.includes('-') ? blockId :
      blockId.slice(0,8) + '-' + blockId.slice(8,12) + '-' + blockId.slice(12,16) + '-' + blockId.slice(16,20) + '-' + blockId.slice(20);

    window.location.href = '/task/' + formattedId;
  } else {
    errorMsg.textContent = '올바른 Notion 링크를 입력해주세요';
    errorMsg.style.display = 'block';
  }
}
</script>
</body>
</html>
